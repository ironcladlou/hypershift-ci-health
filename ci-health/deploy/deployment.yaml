apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-health
  labels:
    app: ci-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-health
  template:
    metadata:
      labels:
        app: ci-health
    spec:
      containers:
        - name: ci-health
          image: image-registry.openshift-image-registry.svc:5000/ci-health/ci-health:latest
          args:
            - serve
            - --github-token-file=/etc/ci-health/github-token/token
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: github-token
              mountPath: /etc/ci-health/github-token
              readOnly: true
      volumes:
        - name: github-token
          secret:
            secretName: github-token
