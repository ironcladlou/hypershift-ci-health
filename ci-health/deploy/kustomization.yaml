apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ci-health
resources:
  - namespace.yaml
  - imagestream.yaml
  - buildconfig.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml
patches:
  - path: route-patch.yaml
secretGenerator:
  - name: github-token
    files:
      - token=.github-token
    options:
      disableNameSuffixHash: true
